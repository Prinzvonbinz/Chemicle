<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chemicle</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:#0f1115;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
}

#game{
width:360px;
text-align:center;
margin-top:20px;
}

h1{
margin:10px;
}

#top{
display:flex;
justify-content:space-between;
margin:10px;
align-items:center;
}

#target{
font-size:34px;
font-weight:bold;
color:#4cafef;
}

#rightPanel{
display:flex;
flex-direction:column;
align-items:center;
width:110px;
}

#hints{
font-size:20px;
display:flex;
justify-content:center;
width:100%;
margin-bottom:4px;
}

#hearts{
font-size:22px;
display:flex;
justify-content:center;
width:100%;
}

.hint{
margin:0 2px;
cursor:pointer;
}

#timer{
width:100%;
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

#bar{
height:100%;
width:100%;
background:#4cafef;
transition:width 0.1s linear;
}

#grid{
display:grid;
grid-template-columns:repeat(4,70px);
gap:10px;
justify-content:center;
margin-top:25px;
}

.cell{
width:70px;
height:70px;
background:#1c2028;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:5px;
font-size:12px;
line-height:1.1;
white-space:nowrap;
cursor:pointer;
}

.cell.selected{
background:#4cafef;
}

.cell.hintMark{
background:#ffd54f;
color:black;
}

#panel{
position:absolute;
top:260px;
left:50%;
transform:translateX(-50%);
width:300px;
background:#1c2028;
border-radius:16px;
padding:20px;
display:none;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#4cafef;
color:white;
}

</style>
</head>

<body>

<div id="game">

<h1>Chemicle</h1>

<div id="top">

<div id="target"></div>

<div id="rightPanel">

<div id="hints">
<span class="hint" onclick="useHint(0)">💡</span>
<span class="hint" onclick="useHint(1)">💡</span>
<span class="hint" onclick="useHint(2)">💡</span>
</div>

<div id="hearts">❤️❤️❤️</div>

</div>

</div>

<div id="timer">
<div id="bar"></div>
</div>

<div id="grid"></div>

</div>

<div id="panel">

<h2 id="result"></h2>
<p id="stats"></p>

<button onclick="startGame()">Nochmal spielen</button>

</div>

<script>

let rows=4
let cols=4

let board=[]
let selected=[]

let hearts=3
let score=0

let target=""
let solutionPair=[]

let hintsLeft=3

let timeLimit=15
let timeLeft=15
let timer

const grid=document.getElementById("grid")
const targetEl=document.getElementById("target")
const heartsEl=document.getElementById("hearts")
const bar=document.getElementById("bar")

/* ✅ FIX: kein doppeltes Array mehr */
const reactions=[

{a:"Stickstoff",b:"Wasserstoff",r:"N2 + 3H2 -> 2NH3"},
{a:"Magnesium",b:"Sauerstoff",r:"2Mg + O2 -> 2MgO"},
{a:"Eisen",b:"Sauerstoff",r:"4Fe + 3O2 -> 2Fe2O3"},
{a:"Calciumoxid",b:"Wasser",r:"CaO + H2O -> Ca(OH)2"},
{a:"Ammoniak",b:"Chlorwasserstoff",r:"NH3 + HCl -> NH4Cl"},

{a:"Natrium",b:"Chlor",r:"2Na + Cl2 -> 2NaCl"},
{a:"Kalium",b:"Chlor",r:"2K + Cl2 -> 2KCl"},
{a:"Wasserstoff",b:"Sauerstoff",r:"2H2 + O2 -> 2H2O"},
{a:"Kohlenstoff",b:"Sauerstoff",r:"C + O2 -> CO2"},
{a:"Kohlenstoffmonoxid",b:"Sauerstoff",r:"2CO + O2 -> 2CO2"},

{a:"Schwefel",b:"Sauerstoff",r:"S + O2 -> SO2"},
{a:"Schwefeldioxid",b:"Sauerstoff",r:"2SO2 + O2 -> 2SO3"},
{a:"Wasser",b:"Kohlenstoffdioxid",r:"CO2 + H2O -> H2CO3"},

{a:"Natriumoxid",b:"Wasser",r:"Na2O + H2O -> 2NaOH"},
{a:"Kaliumoxid",b:"Wasser",r:"K2O + H2O -> 2KOH"},
{a:"Calcium",b:"Wasser",r:"Ca + 2H2O -> Ca(OH)2 + H2"},
{a:"Natrium",b:"Wasser",r:"2Na + 2H2O -> 2NaOH + H2"},

{a:"Zink",b:"Sauerstoff",r:"2Zn + O2 -> 2ZnO"},
{a:"Aluminium",b:"Sauerstoff",r:"4Al + 3O2 -> 2Al2O3"},
{a:"Kupfer",b:"Sauerstoff",r:"2Cu + O2 -> 2CuO"},

{a:"Eisen",b:"Schwefel",r:"Fe + S -> FeS"},
{a:"Natrium",b:"Schwefel",r:"2Na + S -> Na2S"},

{a:"Wasserstoff",b:"Chlor",r:"H2 + Cl2 -> 2HCl"},
{a:"Wasserstoff",b:"Brom",r:"H2 + Br2 -> 2HBr"},

{a:"Ammoniak",b:"Wasser",r:"NH3 + H2O -> NH4+ + OH-"},
{a:"Kohlenstoffdioxid",b:"Calciumhydroxid",r:"CO2 + Ca(OH)2 -> CaCO3 + H2O"},

{a:"Silbernitrat",b:"Natriumchlorid",r:"AgNO3 + NaCl -> AgCl + NaNO3"},
{a:"Bariumchlorid",b:"Schwefelsäure",r:"BaCl2 + H2SO4 -> BaSO4 + 2HCl"},

{a:"Methan",b:"Sauerstoff",r:"CH4 + 2O2 -> CO2 + 2H2O"},
{a:"Ethan",b:"Sauerstoff",r:"2C2H6 + 7O2 -> 4CO2 + 6H2O"},

{a:"Calciumcarbonat",b:"Hitze",r:"CaCO3 -> CaO + CO2"},
{a:"Wasserstoffperoxid",b:"Zersetzung",r:"2H2O2 -> 2H2O + O2"},

{a:"Kupfersulfat",b:"Eisen",r:"CuSO4 + Fe -> FeSO4 + Cu"},
{a:"Zink",b:"Salzsäure",r:"Zn + 2HCl -> ZnCl2 + H2"},

{a:"Magnesium",b:"Salzsäure",r:"Mg + 2HCl -> MgCl2 + H2"},
{a:"Aluminium",b:"Salzsäure",r:"2Al + 6HCl -> 2AlCl3 + 3H2"}

]

function randReaction(){
return reactions[Math.floor(Math.random()*reactions.length)]
}

function generateBoard(){

board=[]
grid.innerHTML=""

grid.style.gridTemplateColumns=`repeat(${cols},70px)`

let r=randReaction()

target=r.r
solutionPair=[r.a,r.b]

targetEl.innerText=target

board.push(r.a)
board.push(r.b)

while(board.length<rows*cols){

let rr=randReaction()
board.push(Math.random()<0.5?rr.a:rr.b)

}

board.sort(()=>Math.random()-0.5)

board.forEach((chem,i)=>{

let d=document.createElement("div")
d.className="cell"
d.innerText=chem

d.onclick=()=>selectCell(d,i)

grid.appendChild(d)

})

}

function selectCell(el,i){

if(el.classList.contains("selected")) return

el.classList.add("selected")

selected.push({
value:board[i],
index:i,
el:el
})

if(selected.length==2){
checkAnswer()
}

}

/* ✅ FIX: direkte Lösung prüfen statt loop */
function checkAnswer(){

let a=selected[0].value
let b=selected[1].value

let correct=
(a==solutionPair[0] && b==solutionPair[1]) ||
(a==solutionPair[1] && b==solutionPair[0])

if(correct){

score++

selected.forEach(s=>{
let rr=randReaction()
board[s.index]=Math.random()<0.5?rr.a:rr.b
s.el.innerText=board[s.index]
s.el.classList.remove("selected")
})

selected=[]

nextRound()

}else{

selected.forEach(s=>s.el.classList.remove("selected"))
selected=[]

}

}

function useHint(index){

if(hintsLeft<=0) return

let bulbs=document.querySelectorAll(".hint")

if(bulbs[index].innerText=="") return

hintsLeft--
bulbs[index].innerText=""

let cells=[...document.querySelectorAll(".cell")]

let pair=[]

cells.forEach(c=>{
if(c.innerText==solutionPair[0] && pair.length==0){
pair.push(c)
}
})

cells.forEach(c=>{
if(c.innerText==solutionPair[1] && pair.length==1){
pair.push(c)
}
})

pair.forEach(c=>c.classList.add("hintMark"))

setTimeout(()=>{
pair.forEach(c=>c.classList.remove("hintMark"))
},1500)

}

function nextRound(){

updateDifficulty()
generateBoard()
resetTimer()

}

function updateDifficulty(){

if(score==5) timeLimit=12
if(score==10) timeLimit=10
if(score==15) timeLimit=8
if(score==20){rows=3;cols=3}
if(score==30){rows=2;cols=2}

if(score>=50){
win()
}

}

function resetTimer(){

clearInterval(timer)

timeLeft=timeLimit
bar.style.width="100%"

timer=setInterval(()=>{

timeLeft-=0.1
bar.style.width=(timeLeft/timeLimit*100)+"%"

if(timeLeft<=0){
clearInterval(timer)
loseHeart()
}

},100)

}

function loseHeart(){

hearts--

heartsEl.innerText="❤️".repeat(hearts)

if(hearts<=0){
gameOver()
}else{
nextRound()
}

}

function gameOver(){

clearInterval(timer)

document.getElementById("panel").style.display="block"

document.getElementById("result").innerText="Game Over"
document.getElementById("stats").innerText="Score: "+score

}

function win(){

clearInterval(timer)

document.getElementById("panel").style.display="block"

document.getElementById("result").innerText="Du hast gewonnen!"
document.getElementById("stats").innerText="Score: "+score

}

function startGame(){

document.getElementById("panel").style.display="none"

rows=4
cols=4
score=0
hearts=3
hintsLeft=3
timeLimit=15

heartsEl.innerText="❤️❤️❤️"

document.querySelectorAll(".hint").forEach(h=>h.innerText="💡")

generateBoard()
resetTimer()

}

startGame()

</script>

</body>
</html>
