<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chemicle</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:#0f1115;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
}

#game{
width:360px;
text-align:center;
margin-top:20px;
}

h1{
margin:10px;
}

#top{
display:flex;
justify-content:space-between;
margin:10px;
align-items:center;
}

#target{
font-size:34px;
font-weight:bold;
color:#4cafef;
}

#rightPanel{
display:flex;
flex-direction:column;
align-items:flex-end;
}

#hearts{
font-size:22px;
}

#hints{
font-size:20px;
cursor:pointer;
}

.hint{
margin-left:4px;
}

#timer{
width:100%;
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

#bar{
height:100%;
width:100%;
background:#4cafef;
}

#grid{
display:grid;
grid-template-columns:repeat(4,70px);
gap:10px;
justify-content:center;
margin-top:25px;
}

.cell{
width:70px;
height:70px;
background:#1c2028;
border-radius:12px;

display:flex;
justify-content:center;
align-items:center;

text-align:center;
padding:5px;

font-size:12px;
line-height:1.1;

white-space:nowrap;   /* verhindert Zeilenumbruch */

cursor:pointer;
}

.cell.selected{
background:#4cafef;
}

.cell.hintMark{
background:#ffd54f;
color:black;
}

#panel{
position:absolute;
top:260px;
left:50%;
transform:translateX(-50%);
width:300px;
background:#1c2028;
border-radius:16px;
padding:20px;
display:none;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#4cafef;
color:white;
}

</style>
</head>

<body>

<div id="game">

<h1>Chemicle</h1>

<div id="top">

<div id="target"></div>

<div id="rightPanel">

<div id="hints">
<span class="hint" onclick="useHint(0)">💡</span>
<span class="hint" onclick="useHint(1)">💡</span>
<span class="hint" onclick="useHint(2)">💡</span>
</div>

<div id="hearts">❤️❤️❤️</div>

</div>

</div>

<div id="timer">
<div id="bar"></div>
</div>

<div id="grid"></div>

</div>

<div id="panel">

<h2 id="result"></h2>
<p id="stats"></p>

<button onclick="startGame()">Nochmal spielen</button>

</div>

<script>

let rows=4
let cols=4

let board=[]
let selected=[]

let hearts=3
let score=0

let target=""
let solutionPair=[]

let hintsLeft=3

let timeLimit=15
let timeLeft=15
let timer

const grid=document.getElementById("grid")
const targetEl=document.getElementById("target")
const heartsEl=document.getElementById("hearts")
const bar=document.getElementById("bar")

const reactions=[

{a:"Wasserstoff",b:"Sauerstoff",r:"H2O"},
{a:"Kohlenstoff",b:"Sauerstoff",r:"CO2"},
{a:"Natrium",b:"Chlor",r:"NaCl"},
{a:"Stickstoff",b:"Wasserstoff",r:"NH3"},
{a:"Magnesium",b:"Sauerstoff",r:"MgO"},
{a:"Eisen",b:"Sauerstoff",r:"Fe2O3"},
{a:"Calciumoxid",b:"Wasser",r:"Ca(OH)2"},
{a:"Ammoniak",b:"Chlor",r:"NH4Cl"}

]

function randReaction(){
return reactions[Math.floor(Math.random()*reactions.length)]
}

/* Board erzeugen mit garantierter Lösung */

function generateBoard(){

board=[]
grid.innerHTML=""

grid.style.gridTemplateColumns=`repeat(${cols},70px)`

let r=randReaction()

target=r.r
solutionPair=[r.a,r.b]

targetEl.innerText=target

board.push(r.a)
board.push(r.b)

while(board.length<rows*cols){

let rr=randReaction()
board.push(Math.random()<0.5?rr.a:rr.b)

}

/* mischen */

board.sort(()=>Math.random()-0.5)

board.forEach((chem,i)=>{

let d=document.createElement("div")
d.className="cell"
d.innerText=chem

d.onclick=()=>selectCell(d,i)

grid.appendChild(d)

})

}

/* Auswahl */

function selectCell(el,i){

if(el.classList.contains("selected")) return

el.classList.add("selected")

selected.push({
value:board[i],
index:i,
el:el
})

if(selected.length==2){
checkAnswer()
}

}

/* Antwort prüfen */

function checkAnswer(){

let a=selected[0].value
let b=selected[1].value

let correct=false

reactions.forEach(r=>{

if(
(r.a==a && r.b==b && r.r==target) ||
(r.a==b && r.b==a && r.r==target)
){
correct=true
}

})

if(correct){

score++

selected.forEach(s=>{
let rr=randReaction()
board[s.index]=Math.random()<0.5?rr.a:rr.b
s.el.innerText=board[s.index]
s.el.classList.remove("selected")
})

selected=[]

nextRound()

}else{

selected.forEach(s=>s.el.classList.remove("selected"))
selected=[]

}

}

/* Tipp-System */

function useHint(index){

if(hintsLeft<=0) return

let bulbs=document.querySelectorAll(".hint")

if(bulbs[index].innerText=="") return

hintsLeft--
bulbs[index].innerText=""

let cells=[...document.querySelectorAll(".cell")]

let marked=[]

cells.forEach(c=>{
if(solutionPair.includes(c.innerText)){
marked.push(c)
}
})

marked.forEach(c=>c.classList.add("hintMark"))

setTimeout(()=>{
marked.forEach(c=>c.classList.remove("hintMark"))
},1500)

}

/* nächste Runde */

function nextRound(){

updateDifficulty()

generateBoard()

resetTimer()

}

/* Schwierigkeit */

function updateDifficulty(){

if(score==5) timeLimit=12
if(score==10) timeLimit=10
if(score==15) timeLimit=8
if(score==20){rows=3;cols=3}
if(score==30){rows=2;cols=2}

if(score>=50){
win()
}

}

/* Timer */

function resetTimer(){

clearInterval(timer)

timeLeft=timeLimit
bar.style.width="100%"

timer=setInterval(()=>{

timeLeft-=0.1
bar.style.width=(timeLeft/timeLimit*100)+"%"

if(timeLeft<=0){

clearInterval(timer)
loseHeart()

}

},100)

}

function loseHeart(){

hearts--

heartsEl.innerText="❤️".repeat(hearts)

if(hearts<=0){
gameOver()
}else{
nextRound()
}

}

/* Game Over */

function gameOver(){

clearInterval(timer)

document.getElementById("panel").style.display="block"

document.getElementById("result").innerText="Game Over"
document.getElementById("stats").innerText="Score: "+score

}

/* Sieg */

function win(){

clearInterval(timer)

document.getElementById("panel").style.display="block"

document.getElementById("result").innerText="Du hast gewonnen!"
document.getElementById("stats").innerText="Score: "+score

}

/* Start */

function startGame(){

document.getElementById("panel").style.display="none"

rows=4
cols=4
score=0
hearts=3
hintsLeft=3
timeLimit=15

heartsEl.innerText="❤️❤️❤️"

document.querySelectorAll(".hint").forEach(h=>h.innerText="💡")

generateBoard()
resetTimer()

}

startGame()

</script>

</body>
</html>
